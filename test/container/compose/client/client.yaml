services:
  go-fdo-client:
    container_name: go-fdo-client
    hostname: go-fdo-client
    build: ${client_src_dir}
    image: go-fdo-client
    working_dir: ${container_working_dir:-/workdir}/device-credentials
    user: "${container_user}"
    tty: false
    networks:
      - fdo
    volumes:
      - ${base_dir:-./workdir}:${container_working_dir:-/workdir}
    restart: no
networks:
  fdo:
    name: fdo
    external: true
